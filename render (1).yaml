services:
  - type: web
    name: snapload-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: ADMIN_SECRET
        value: snapload_admin_2026
      - key: PYTHON_VERSION
        value: 3.11.0
